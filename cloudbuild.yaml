steps:
  # Enable BuildKit by setting environment variables
  - name: 'gcr.io/cloud-builders/docker'
    env:
      - 'DOCKER_BUILDKIT=1'
      - 'BUILDKIT_PROGRESS=plain'
    args:
      - 'build'
      - '--file=docker/prod.Dockerfile'
      - '--tag=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA'
      - '.'
    id: 'build'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA']
    id: 'push'
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPOSITORY/$_IMAGE_NAME:$SHORT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _REGION: asia-south1
  _REPOSITORY: care
  _IMAGE_NAME: care
